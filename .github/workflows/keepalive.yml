name: Keep Streamlit Awake

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"

  # Allows you to run it manually
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl -L -s -o /dev/null https://jdf-construction.streamlit.app