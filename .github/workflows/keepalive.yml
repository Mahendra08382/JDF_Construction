name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit
        run: |
          python - <<EOF
          import requests

          r = requests.get(
              "https://jdf-construction.streamlit.app",
              headers={"User-Agent": "Mozilla/5.0"},
              timeout=30
          )

          print(r.status_code)
          print(r.url)
          EOF